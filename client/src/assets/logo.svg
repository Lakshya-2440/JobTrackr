<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Primary gradient - Cyan to Blue spectrum -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <!-- Secondary gradient - Blue to Indigo -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main shape - Abstract geometric core -->
  <g transform="translate(32, 32)">
    <!-- Outer hexagon outline -->
    <path d="M 0,-14 L 12,-7 L 12,7 L 0,14 L -12,7 L -12,-7 Z" 
          fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Inner hexagon -->
    <path d="M 0,-10 L 8.66,-5 L 8.66,5 L 0,10 L -8.66,5 L -8.66,-5 Z" 
          fill="url(#grad2)" opacity="0.85" filter="url(#glow)"/>
    
    <!-- Central bright core -->
    <circle cx="0" cy="0" r="2.5" fill="#06b6d4" opacity="0.95"/>
    <circle cx="0" cy="0" r="1.2" fill="white" opacity="0.6"/>
    
    <!-- Corner accent pulses -->
    <circle cx="8.66" cy="-5" r="1.2" fill="#06b6d4" opacity="0.7"/>
    <circle cx="8.66" cy="5" r="1.2" fill="#0ea5e9" opacity="0.7"/>
    <circle cx="-8.66" cy="5" r="1.2" fill="#6366f1" opacity="0.7"/>
    <circle cx="-8.66" cy="-5" r="1.2" fill="#06b6d4" opacity="0.7"/>
    
    <!-- Tech lines connecting to center -->
    <line x1="0" y1="-10" x2="0" y2="10" stroke="url(#grad1)" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>
    <line x1="-8.66" y1="-5" x2="8.66" y2="5" stroke="url(#grad2)" stroke-width="0.8" opacity="0.25" stroke-linecap="round"/>
    <line x1="-8.66" y1="5" x2="8.66" y2="-5" stroke="url(#grad1)" stroke-width="0.8" opacity="0.25" stroke-linecap="round"/>
    
    <!-- Outer ring - motion effect -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="url(#grad1)" stroke-width="0.6" opacity="0.2" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Outer glow rim for dark background compatibility -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>
</svg>

