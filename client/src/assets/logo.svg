<svg width="280" height="56" viewBox="0 0 280 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main container with rounded background -->
  <rect width="56" height="56" rx="16" fill="#1E293B" opacity="0.5"/>
  
  <!-- Outer ring - Tech circle -->
  <circle cx="28" cy="28" r="24" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="28" cy="28" r="20" fill="none" stroke="url(#grad1)" stroke-width="1" opacity="0.2"/>
  
  <!-- Core geometric shape - AI inspired neural node cluster -->
  <!-- Central node -->
  <circle cx="28" cy="28" r="3.5" fill="url(#grad1)"/>
  
  <!-- Upper nodes - forming network pattern -->
  <circle cx="28" cy="14" r="2.5" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="18" cy="19" r="2.5" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="38" cy="19" r="2.5" fill="url(#grad1)" opacity="0.8"/>
  
  <!-- Lower nodes -->
  <circle cx="28" cy="42" r="2.5" fill="url(#grad2)" opacity="0.8"/>
  <circle cx="16" cy="37" r="2.5" fill="url(#grad2)" opacity="0.8"/>
  <circle cx="40" cy="37" r="2.5" fill="url(#grad2)" opacity="0.8"/>
  
  <!-- Connection lines - neural pathway style -->
  <line x1="28" y1="28" x2="28" y2="14" stroke="url(#grad1)" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="28" x2="18" y2="19" stroke="url(#grad1)" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="28" x2="38" y2="19" stroke="url(#grad1)" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="28" x2="28" y2="42" stroke="url(#grad2)" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="28" x2="16" y2="37" stroke="url(#grad2)" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="28" x2="40" y2="37" stroke="url(#grad2)" stroke-width="1" opacity="0.6"/>
  
  <!-- Glow effect circles at key points -->
  <circle cx="28" cy="14" r="4.5" fill="url(#grad1)" opacity="0.15"/>
  <circle cx="28" cy="42" r="4.5" fill="url(#grad2)" opacity="0.15"/>
  
  <!-- Text logo -->
  <text x="76" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="white" letter-spacing="-0.5">
    JobTrackr
  </text>
  
  <!-- Subtle tech accent line under text -->
  <line x1="76" y1="45" x2="76" y2="45.5" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  <line x1="78" y1="45" x2="125" y2="45" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
</svg>

