<svg width="280" height="56" viewBox="0 0 280 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary gradient - Blue to Indigo (AI core) -->
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gradient - Cyan to Blue (Neural accent) -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main icon background with dual gradient -->
  <rect width="56" height="56" rx="14" fill="url(#aiGradient)" opacity="0.95"/>
  
  <!-- Glass effect overlay -->
  <rect width="56" height="56" rx="14" fill="white" opacity="0.08" stroke="white" stroke-width="1.5" stroke-opacity="0.15"/>
  
  <!-- Abstract AI shape - Stylized circuit/neural element -->
  <!-- Top left corner accent -->
  <path d="M 12 12 Q 18 8 24 10 L 24 18 Q 18 16 12 20 Z" fill="url(#accentGradient)" opacity="0.7"/>
  
  <!-- Central orb - AI core -->
  <circle cx="28" cy="28" r="7" fill="url(#accentGradient)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="28" cy="28" r="5.5" fill="#06B6D4" opacity="0.4"/>
  
  <!-- Inner bright core -->
  <circle cx="28" cy="28" r="2.5" fill="white" opacity="0.8"/>
  
  <!-- Bottom right corner accent -->
  <path d="M 44 44 Q 38 48 32 46 L 32 38 Q 38 40 44 36 Z" fill="url(#accentGradient)" opacity="0.7"/>
  
  <!-- Connecting circuit lines -->
  <line x1="12" y1="16" x2="22" y2="24" stroke="#06B6D4" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
  <line x1="44" y1="40" x2="34" y2="32" stroke="#06B6D4" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
  <line x1="18" y1="12" x2="28" y2="21" stroke="#0EA5E9" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
  <line x1="38" y1="35" x2="48" y2="44" stroke="#0EA5E9" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Node points -->
  <circle cx="12" cy="16" r="1.5" fill="#06B6D4" opacity="0.7"/>
  <circle cx="44" cy="40" r="1.5" fill="#06B6D4" opacity="0.7"/>
  <circle cx="18" cy="12" r="1" fill="#0EA5E9" opacity="0.5"/>
  <circle cx="48" cy="44" r="1" fill="#0EA5E9" opacity="0.5"/>
  
  <!-- Holographic ring effect -->
  <circle cx="28" cy="28" r="10" fill="none" stroke="url(#accentGradient)" stroke-width="0.8" opacity="0.3" stroke-dasharray="2,2"/>
  
  <!-- Text branding -->
  <text x="70" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="white" letter-spacing="-0.8">
    JobTrackr
  </text>
  
  <!-- AI badge subtitle -->
  <text x="70" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" letter-spacing="0.8" fill="#06B6D4" opacity="0.9" text-transform="uppercase">
    AI-Powered
  </text>
</svg>
  <!-- Subtle tech accent line under text -->
  <line x1="76" y1="45" x2="76" y2="45.5" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  <line x1="78" y1="45" x2="125" y2="45" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
</svg>

